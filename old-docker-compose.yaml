services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dole_payroll_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: dole_payroll
      DB_USERNAME: root
      DB_PASSWORD: root
      SANCTUM_STATEFUL_DOMAINS: localhost:8000
    command: ["sh", "/var/www/dev.sh"]

  db:
    image: mysql:8.0
    container_name: dole_payroll_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dole_payroll
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  adminer:
    image: adminer
    container_name: dole_payroll_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  dbdata: