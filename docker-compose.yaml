services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dole_payroll_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
    env_file:
      - .env
    environment:
      SANCTUM_STATEFUL_DOMAINS: localhost:8000
    command: ["sh", "/var/www/start.sh"]
    depends_on:
      - redis
      - db

  redis:            
    image: redis:7-alpine
    container_name: dole_payroll_redis
    restart: unless-stopped
    ports:
      - "6379:6379"  

  adminer:
    image: adminer
    container_name: dole_payroll_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dole_payroll
    volumes:
      - db_data:/var/lib/mysql

volumes:
  vendor_data:
  db_data:    